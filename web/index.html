<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Scanner</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --accent: #38bdf8;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    overflow-x: hidden;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 1px;
  }
  #status-bar {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text-dim);
  }
  #status-bar .live {
    color: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Main layout */
  .main {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: calc(100vh - 40px);
  }

  /* Spectrum + Waterfall container */
  .viz-container {
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Spectrum canvas */
  #spectrum-container {
    position: relative;
    height: 180px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  #spectrum-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  #spectrum-tooltip {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 11px;
    color: var(--accent);
    pointer-events: none;
  }
  #freq-axis {
    display: flex;
    justify-content: space-between;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  /* Waterfall canvas */
  #waterfall-container {
    flex: 1;
    min-height: 200px;
    background: #000;
    position: relative;
  }
  #waterfall-canvas {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
  }

  /* Bottom panel */
  .bottom-panel {
    display: grid;
    grid-template-columns: 1fr 320px;
    height: 240px;
    border-top: 1px solid var(--border);
  }

  /* Decoded messages feed */
  .decoded-panel {
    background: var(--surface);
    overflow-y: auto;
    padding: 0;
    border-right: 1px solid var(--border);
  }
  .decoded-panel h2 {
    position: sticky;
    top: 0;
    background: var(--surface);
    padding: 6px 12px;
    font-size: 12px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    z-index: 1;
  }
  .msg-row {
    padding: 4px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    animation: fadeIn 0.3s;
  }
  .msg-row:hover { background: rgba(56,189,248,0.05); }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; } }
  .msg-time { color: var(--text-dim); }
  .msg-model { color: var(--green); font-weight: 600; }
  .msg-freq { color: var(--orange); }
  .msg-data { color: var(--text); }
  .msg-rssi { color: var(--yellow); }
  .no-msg { color: var(--text-dim); padding: 20px 12px; text-align: center; font-style: italic; }

  /* Side panel - power + stats */
  .side-panel {
    background: var(--surface);
    padding: 8px 12px;
    overflow-y: auto;
  }
  .side-panel h2 {
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .power-meter {
    margin-bottom: 10px;
  }
  .power-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    margin-bottom: 3px;
  }
  .power-label .name { color: var(--text-dim); }
  .power-label .value { font-weight: 600; }
  .power-bar-bg {
    height: 8px;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
  }
  .power-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s, background 0.3s;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    font-size: 11px;
    color: var(--text-dim);
    border-bottom: 1px solid rgba(30,41,59,0.5);
  }
  .stat-val { color: var(--text); font-weight: 600; }

  /* Color scale legend */
  .color-scale {
    position: absolute;
    right: 8px;
    top: 8px;
    width: 14px;
    height: 120px;
    border: 1px solid var(--border);
    border-radius: 2px;
    z-index: 2;
  }
  .color-label {
    position: absolute;
    right: 26px;
    font-size: 9px;
    color: var(--text-dim);
  }
  .color-label.top { top: 6px; }
  .color-label.bot { bottom: 6px; }
</style>
</head>
<body>

<header>
  <h1>RADIO SCANNER</h1>
  <div id="status-bar">
    <span id="conn-status">CONNECTING...</span>
    <span id="sweep-count">Sweeps: 0</span>
    <span id="decoded-count">Decoded: 0</span>
    <span id="uptime">0s</span>
  </div>
</header>

<div class="main">
  <div class="viz-container">
    <div id="spectrum-container">
      <canvas id="spectrum-canvas"></canvas>
      <div id="spectrum-tooltip"></div>
    </div>
    <div id="freq-axis"></div>
    <div id="waterfall-container">
      <canvas id="waterfall-canvas"></canvas>
      <div class="color-scale" id="color-scale"></div>
      <span class="color-label top">-20 dB</span>
      <span class="color-label bot">-70 dB</span>
    </div>
  </div>

  <div class="bottom-panel">
    <div class="decoded-panel" id="decoded-panel">
      <h2>DECODED MESSAGES <span id="msg-total">(0)</span></h2>
      <div id="msg-feed">
        <div class="no-msg">Waiting for signals...</div>
      </div>
    </div>
    <div class="side-panel">
      <h2>POWER MONITORS</h2>
      <div id="power-monitors"></div>
      <h2 style="margin-top:12px;">STATISTICS</h2>
      <div id="stats-panel"></div>
      <h2 style="margin-top:12px;">CHANNELS</h2>
      <div id="channels-panel"></div>
    </div>
  </div>
</div>

<script>
// === STATE ===
let ws;
let config = { freq_min: 300, freq_max: 950, freq_bins: 650 };
let spectrumData = new Float32Array(650).fill(-100);
let waterfallRows = [];
const MAX_WATERFALL = 300;
let startTime = Date.now();
let messages = [];
let powerLevels = {};
let stats = {};

// === WATERFALL COLOR MAP ===
function dbToColor(db) {
  // Map -70..-20 dB to a color gradient
  const t = Math.max(0, Math.min(1, (db + 70) / 50));
  if (t < 0.25) {
    // black → dark blue
    const s = t / 0.25;
    return [0, 0, Math.floor(80 * s)];
  } else if (t < 0.5) {
    // dark blue → cyan
    const s = (t - 0.25) / 0.25;
    return [0, Math.floor(200 * s), 80 + Math.floor(175 * s)];
  } else if (t < 0.75) {
    // cyan → yellow
    const s = (t - 0.5) / 0.25;
    return [Math.floor(255 * s), 200 + Math.floor(55 * s), Math.floor(255 * (1 - s))];
  } else {
    // yellow → red/white
    const s = (t - 0.75) / 0.25;
    return [255, Math.floor(255 * (1 - s * 0.6)), Math.floor(255 * s * 0.3)];
  }
}

// === SPECTRUM CANVAS ===
const specCanvas = document.getElementById('spectrum-canvas');
const specCtx = specCanvas.getContext('2d');
const tooltip = document.getElementById('spectrum-tooltip');

function resizeSpecCanvas() {
  const rect = specCanvas.parentElement.getBoundingClientRect();
  specCanvas.width = rect.width * devicePixelRatio;
  specCanvas.height = rect.height * devicePixelRatio;
  specCtx.scale(devicePixelRatio, devicePixelRatio);
}

function drawSpectrum() {
  const w = specCanvas.width / devicePixelRatio;
  const h = specCanvas.height / devicePixelRatio;
  const n = spectrumData.length;

  specCtx.clearRect(0, 0, w, h);

  // Grid
  specCtx.strokeStyle = 'rgba(30,41,59,0.6)';
  specCtx.lineWidth = 0.5;
  for (let db = -70; db <= -20; db += 10) {
    const y = h - ((db + 70) / 50) * h;
    specCtx.beginPath();
    specCtx.moveTo(0, y);
    specCtx.lineTo(w, y);
    specCtx.stroke();
    specCtx.fillStyle = '#475569';
    specCtx.font = '9px monospace';
    specCtx.fillText(`${db}`, 4, y - 2);
  }

  // Frequency markers
  specCtx.fillStyle = '#334155';
  specCtx.font = '9px monospace';
  for (let f = 350; f <= 900; f += 50) {
    const x = ((f - config.freq_min) / (config.freq_max - config.freq_min)) * w;
    specCtx.beginPath();
    specCtx.moveTo(x, 0);
    specCtx.lineTo(x, h);
    specCtx.stroke();
  }

  // Spectrum line
  specCtx.beginPath();
  specCtx.strokeStyle = '#38bdf8';
  specCtx.lineWidth = 1.2;
  for (let i = 0; i < n; i++) {
    const x = (i / n) * w;
    const db = Math.max(-70, Math.min(-15, spectrumData[i]));
    const y = h - ((db + 70) / 55) * h;
    if (i === 0) specCtx.moveTo(x, y);
    else specCtx.lineTo(x, y);
  }
  specCtx.stroke();

  // Fill under curve
  const lastX = w;
  const lastDb = Math.max(-70, Math.min(-15, spectrumData[n - 1]));
  const lastY = h - ((lastDb + 70) / 55) * h;
  specCtx.lineTo(lastX, h);
  specCtx.lineTo(0, h);
  specCtx.closePath();
  const grad = specCtx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(56,189,248,0.25)');
  grad.addColorStop(1, 'rgba(56,189,248,0.02)');
  specCtx.fillStyle = grad;
  specCtx.fill();
}

// Mouse tracking on spectrum
specCanvas.addEventListener('mousemove', (e) => {
  const rect = specCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const ratio = x / rect.width;
  const freq = config.freq_min + ratio * (config.freq_max - config.freq_min);
  const idx = Math.floor(ratio * spectrumData.length);
  const db = idx >= 0 && idx < spectrumData.length ? spectrumData[idx].toFixed(1) : '?';
  tooltip.textContent = `${freq.toFixed(1)} MHz | ${db} dB`;
});

// === WATERFALL CANVAS ===
const wfCanvas = document.getElementById('waterfall-canvas');
const wfCtx = wfCanvas.getContext('2d');

function resizeWfCanvas() {
  const rect = wfCanvas.parentElement.getBoundingClientRect();
  wfCanvas.width = rect.width;
  wfCanvas.height = rect.height;
}

function drawWaterfall() {
  const w = wfCanvas.width;
  const h = wfCanvas.height;
  const rows = waterfallRows.length;
  if (rows === 0) return;

  const rowH = Math.max(1, h / MAX_WATERFALL);
  const imgData = wfCtx.createImageData(w, Math.ceil(rows * rowH));

  for (let r = 0; r < rows; r++) {
    const row = waterfallRows[rows - 1 - r];
    const yStart = Math.floor(r * rowH);
    const yEnd = Math.floor((r + 1) * rowH);
    for (let x = 0; x < w; x++) {
      const binIdx = Math.floor((x / w) * row.length);
      const db = row[binIdx] || -100;
      const [cr, cg, cb] = dbToColor(db);
      for (let y = yStart; y < yEnd && y < imgData.height; y++) {
        const off = (y * w + x) * 4;
        imgData.data[off] = cr;
        imgData.data[off + 1] = cg;
        imgData.data[off + 2] = cb;
        imgData.data[off + 3] = 255;
      }
    }
  }
  wfCtx.putImageData(imgData, 0, 0);
}

// === COLOR SCALE ===
function drawColorScale() {
  const el = document.getElementById('color-scale');
  const canvas = document.createElement('canvas');
  canvas.width = 14;
  canvas.height = 120;
  const ctx = canvas.getContext('2d');
  for (let y = 0; y < 120; y++) {
    const db = -20 - (y / 120) * 50;
    const [r, g, b] = dbToColor(db);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, y, 14, 1);
  }
  el.style.background = `url(${canvas.toDataURL()})`;
  el.style.backgroundSize = 'cover';
}

// === FREQUENCY AXIS ===
function drawFreqAxis() {
  const el = document.getElementById('freq-axis');
  el.innerHTML = '';
  for (let f = config.freq_min; f <= config.freq_max; f += 50) {
    const span = document.createElement('span');
    span.textContent = `${f}`;
    el.appendChild(span);
  }
}

// === DECODED MESSAGES ===
function updateMessages(newMsgs, total) {
  const feed = document.getElementById('msg-feed');
  document.getElementById('msg-total').textContent = `(${total})`;

  if (newMsgs.length === 0) return;

  // Remove "waiting" placeholder
  const noMsg = feed.querySelector('.no-msg');
  if (noMsg) noMsg.remove();

  for (const msg of newMsgs) {
    // Skip if already displayed (check by timestamp)
    if (messages.find(m => m._ts === msg._ts && m.model === msg.model)) continue;
    messages.push(msg);

    const row = document.createElement('div');
    row.className = 'msg-row';

    const time = msg.time || msg._ts || '';
    const timeShort = time.split('T').pop()?.substring(0, 8) || time.substring(11, 19) || '';
    const model = msg.model || 'Unknown';
    const freq = msg._freq || '';
    const rssi = msg.rssi || msg.snr || '';

    // Data fields
    const dataFields = [];
    for (const key of ['temperature_C', 'humidity', 'battery_ok', 'wind_avg_km_h',
                        'rain_mm', 'pressure_hPa', 'code', 'button', 'cmd', 'data',
                        'id', 'channel', 'state']) {
      if (msg[key] !== undefined) dataFields.push(`${key}=${msg[key]}`);
    }

    row.innerHTML = `
      <span class="msg-time">${timeShort}</span>
      <span class="msg-model">${model}</span>
      <span class="msg-freq">@${freq}</span>
      ${rssi ? `<span class="msg-rssi">[${rssi}dB]</span>` : ''}
      <br><span class="msg-data">${dataFields.join(' | ')}</span>
    `;

    feed.insertBefore(row, feed.firstChild);

    // Limit feed size
    while (feed.children.length > 100) {
      feed.removeChild(feed.lastChild);
    }
  }
}

// === POWER MONITORS ===
function updatePower(levels) {
  powerLevels = levels;
  const container = document.getElementById('power-monitors');
  container.innerHTML = '';

  for (const [label, data] of Object.entries(levels)) {
    const div = document.createElement('div');
    div.className = 'power-meter';

    const pct = Math.max(0, Math.min(100, (data.mean_db + 50) * 2.5));
    let barColor = 'var(--green)';
    if (data.mean_db > -15) barColor = 'var(--red)';
    else if (data.mean_db > -25) barColor = 'var(--yellow)';
    else if (data.mean_db > -35) barColor = 'var(--accent)';

    div.innerHTML = `
      <div class="power-label">
        <span class="name">${label} (${data.freq_mhz} MHz)</span>
        <span class="value" style="color:${barColor}">${data.mean_db} dB</span>
      </div>
      <div class="power-bar-bg">
        <div class="power-bar" style="width:${pct}%; background:${barColor}"></div>
      </div>
    `;
    container.appendChild(div);
  }
}

// === STATS ===
function updateStats(s) {
  stats = s;
  const container = document.getElementById('stats-panel');
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(0);
  container.innerHTML = `
    <div class="stat-row"><span>Uptime</span><span class="stat-val">${elapsed}s</span></div>
    <div class="stat-row"><span>HackRF sweeps</span><span class="stat-val">${(s.sweeps || 0).toLocaleString()}</span></div>
    <div class="stat-row"><span>Decoded msgs</span><span class="stat-val">${s.decoded || 0}</span></div>
    <div class="stat-row"><span>Power readings</span><span class="stat-val">${s.power_readings || 0}</span></div>
  `;
  document.getElementById('sweep-count').textContent = `Sweeps: ${(s.sweeps || 0).toLocaleString()}`;
  document.getElementById('decoded-count').textContent = `Decoded: ${s.decoded || 0}`;
  document.getElementById('uptime').textContent = `${elapsed}s`;
}

// === CHANNELS INFO ===
function updateChannels(channels) {
  const container = document.getElementById('channels-panel');
  if (!channels) return;
  let html = '';
  if (channels.rtl433) {
    for (const [id, ch] of Object.entries(channels.rtl433)) {
      html += `<div class="stat-row"><span>Ch${id}: ${ch.label}</span><span class="stat-val" style="color:var(--green)">RX</span></div>`;
    }
  }
  if (channels.power) {
    for (const [id, ch] of Object.entries(channels.power)) {
      html += `<div class="stat-row"><span>Ch${id}: ${ch.label}</span><span class="stat-val" style="color:var(--yellow)">PWR</span></div>`;
    }
  }
  container.innerHTML = html;
}

// === WEBSOCKET ===
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('conn-status').textContent = 'LIVE';
    document.getElementById('conn-status').className = 'live';
    startTime = Date.now();
  };

  ws.onclose = () => {
    document.getElementById('conn-status').textContent = 'DISCONNECTED';
    document.getElementById('conn-status').className = '';
    setTimeout(connect, 2000);
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);

    switch (msg.type) {
      case 'init':
        config = msg;
        drawFreqAxis();
        if (msg.channels) updateChannels(msg.channels);
        break;

      case 'spectrum':
        spectrumData = new Float32Array(msg.data);
        waterfallRows.push(msg.data);
        if (waterfallRows.length > MAX_WATERFALL) waterfallRows.shift();
        if (msg.stats) updateStats(msg.stats);
        requestAnimationFrame(() => {
          drawSpectrum();
          drawWaterfall();
        });
        break;

      case 'decoded':
        updateMessages(msg.messages, msg.total);
        break;

      case 'power':
        updatePower(msg.levels);
        break;
    }
  };
}

// === INIT ===
window.addEventListener('resize', () => {
  resizeSpecCanvas();
  resizeWfCanvas();
  drawSpectrum();
  drawWaterfall();
});

resizeSpecCanvas();
resizeWfCanvas();
drawFreqAxis();
drawColorScale();
connect();
</script>
</body>
</html>
