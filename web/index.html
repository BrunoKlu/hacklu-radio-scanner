<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Scanner</title>
<style>
  :root {
    --bg: #0a0e17; --surface: #111827; --border: #1e293b;
    --text: #e2e8f0; --text-dim: #64748b; --accent: #38bdf8;
    --green: #22c55e; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;font-size:13px;display:flex;flex-direction:column}

  /* Header */
  header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
  header h1{font-size:14px;font-weight:600;color:var(--accent);letter-spacing:1px}
  #status-bar{display:flex;gap:14px;font-size:10px;color:var(--text-dim)}
  #status-bar .live{color:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* SA Control bar */
  .sa-controls{flex-shrink:0;display:flex;align-items:center;gap:2px;padding:3px 8px;background:#0d1220;border-bottom:1px solid var(--border);font-size:10px;flex-wrap:wrap}
  .sa-group{display:flex;align-items:center;gap:3px;padding:1px 6px;border-right:1px solid var(--border);white-space:nowrap}
  .sa-group:last-child{border-right:none}
  .sa-lbl{color:var(--text-dim);margin-right:2px}
  .sa-val{color:var(--accent);font-weight:600;min-width:40px;text-align:center}
  .sa-btn{background:var(--border);color:var(--text);border:none;padding:1px 5px;border-radius:2px;cursor:pointer;font-size:9px;font-family:inherit}
  .sa-btn:hover{background:var(--accent);color:var(--bg)}
  .sa-btn.active{background:var(--accent);color:var(--bg)}
  .sa-btn.on{background:var(--green);color:var(--bg)}
  .sa-input{background:var(--bg);border:1px solid var(--border);color:var(--accent);font-weight:600;padding:1px 4px;border-radius:2px;font-size:10px;font-family:inherit;width:55px;text-align:center}
  .sa-input:focus{outline:none;border-color:var(--accent)}
  .sa-input-sm{width:35px}
  .sa-input::-webkit-inner-spin-button{opacity:0.3}
  .sa-select{background:var(--bg);border:1px solid var(--border);color:var(--accent);font-weight:600;padding:1px 2px;border-radius:2px;font-size:10px;font-family:inherit;cursor:pointer}
  .sa-select:focus{outline:none;border-color:var(--accent)}
  .sa-btn.marker-btn{background:#7c3aed;color:#fff}
  .sa-btn.marker-btn:hover{background:#9333ea}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;min-height:0}
  #spectrum-wrap{position:relative;flex-shrink:0;height:200px;min-height:80px;background:var(--surface)}
  #spectrum-canvas{width:100%;height:100%;display:block;cursor:crosshair}
  #select-overlay{position:absolute;top:0;height:100%;background:rgba(56,189,248,.12);border-left:1px solid var(--accent);border-right:1px solid var(--accent);pointer-events:none;display:none}
  /* Marker labels */
  .marker-label{position:absolute;font-size:9px;font-weight:700;pointer-events:none;text-shadow:0 0 3px #000;transform:translate(-50%,-100%);padding:1px 3px}
  .resize-h{flex-shrink:0;height:5px;background:var(--border);cursor:row-resize;transition:background .15s}
  .resize-h:hover,.resize-h.active{background:var(--accent)}
  #freq-axis{flex-shrink:0;height:18px;background:var(--surface);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
  .freq-tick{position:absolute;top:2px;font-size:9px;color:var(--text-dim);transform:translateX(-50%);white-space:nowrap}
  #waterfall-wrap{flex:1;min-height:60px;background:#000;position:relative}
  #waterfall-canvas{width:100%;height:100%;display:block;image-rendering:pixelated;cursor:crosshair}
  .color-scale{position:absolute;right:6px;top:6px;width:12px;height:100px;border:1px solid var(--border);border-radius:2px;z-index:2}
  .color-label{position:absolute;right:22px;font-size:9px;color:var(--text-dim)}
  .color-label.top{top:4px}.color-label.bot{bottom:4px}
  .resize-h-bottom{flex-shrink:0;height:5px;background:var(--border);cursor:row-resize;transition:background .15s}
  .resize-h-bottom:hover,.resize-h-bottom.active{background:var(--accent)}

  /* Bottom panel */
  .bottom-panel{flex-shrink:0;height:200px;min-height:60px;display:flex;border-top:1px solid var(--border)}
  .decoded-panel{flex:1;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
  .decoded-header{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:3px 8px;background:var(--surface);border-bottom:1px solid var(--border)}
  .decoded-header h2{font-size:11px;color:var(--accent);white-space:nowrap}
  .filter-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:1px 5px;border-radius:3px;font-size:10px;font-family:inherit;max-width:160px}
  .filter-input::placeholder{color:var(--text-dim)}.filter-input:focus{outline:none;border-color:var(--accent)}
  #msg-feed{flex:1;overflow-y:auto}
  .msg-row{padding:2px 8px;border-bottom:1px solid rgba(30,41,59,.4);font-size:10px}
  .msg-row:hover{background:rgba(56,189,248,.05)}
  .msg-row.filtered-out{display:none}
  .msg-time{color:var(--text-dim)}.msg-model{color:var(--green);font-weight:600}.msg-freq{color:var(--orange)}.msg-data{color:var(--text)}.msg-rssi{color:var(--yellow)}
  .no-msg{color:var(--text-dim);padding:12px 8px;text-align:center;font-style:italic;font-size:11px}
  .side-panel{flex-shrink:0;width:260px;background:var(--surface);padding:5px 8px;overflow-y:auto}
  .side-panel h2{font-size:10px;color:var(--accent);margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid var(--border)}
  .power-meter{margin-bottom:6px}
  .power-label{display:flex;justify-content:space-between;font-size:9px;margin-bottom:1px}
  .power-label .name{color:var(--text-dim)}.power-label .value{font-weight:600}
  .power-bar-bg{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
  .power-bar{height:100%;border-radius:3px;transition:width .3s,background .3s}
  .stat-row{display:flex;justify-content:space-between;padding:1px 0;font-size:9px;color:var(--text-dim);border-bottom:1px solid rgba(30,41,59,.3)}
  .stat-val{color:var(--text);font-weight:600}
</style>
</head>
<body>
<header>
  <h1>RADIO SCANNER</h1>
  <div id="status-bar">
    <span id="conn-status">CONNECTING...</span>
    <span id="sweep-count">Sweeps: 0</span>
    <span id="decoded-count">Decoded: 0</span>
    <span id="uptime">0s</span>
  </div>
</header>

<!-- SA Controls -->
<div class="sa-controls">
  <div class="sa-group">
    <span class="sa-lbl">Center</span>
    <input class="sa-input" id="sa-center" type="number" value="625" step="1" onchange="applyCenter()">
    <span class="sa-lbl">MHz</span>
    <button class="sa-btn" onclick="nudgeCenter(-1)">&lt;</button><button class="sa-btn" onclick="nudgeCenter(1)">&gt;</button>
  </div>
  <div class="sa-group">
    <span class="sa-lbl">Span</span>
    <input class="sa-input" id="sa-span" type="number" value="650" step="1" onchange="applySpan()">
    <span class="sa-lbl">MHz</span>
    <button class="sa-btn" onclick="setSpan('full')">Full</button>
    <button class="sa-btn" onclick="setSpan(100)">100</button>
    <button class="sa-btn" onclick="setSpan(50)">50</button>
    <button class="sa-btn" onclick="setSpan(20)">20</button>
    <button class="sa-btn" onclick="setSpan(10)">10</button>
    <button class="sa-btn" onclick="setSpan(5)">5</button>
  </div>
  <div class="sa-group">
    <span class="sa-lbl">Start</span>
    <input class="sa-input" id="sa-start" type="number" value="300" step="1" onchange="applyStartStop()">
    <span class="sa-lbl">Stop</span>
    <input class="sa-input" id="sa-stop" type="number" value="950" step="1" onchange="applyStartStop()">
    <span class="sa-lbl">MHz</span>
  </div>
  <div class="sa-group">
    <span class="sa-lbl">Ref</span><span class="sa-val" id="sa-ref">-10</span><span class="sa-lbl">dBm</span>
    <button class="sa-btn" onclick="adjustRef(5)">+</button><button class="sa-btn" onclick="adjustRef(-5)">-</button>
  </div>
  <div class="sa-group">
    <span class="sa-lbl">dB/div</span>
    <button class="sa-btn" id="dbdiv-5" onclick="setDbDiv(5)">5</button>
    <button class="sa-btn active" id="dbdiv-10" onclick="setDbDiv(10)">10</button>
    <button class="sa-btn" id="dbdiv-15" onclick="setDbDiv(15)">15</button>
  </div>
  <div class="sa-group">
    <span class="sa-lbl">LNA</span>
    <input class="sa-input sa-input-sm" id="sa-lna" type="number" value="32" min="0" max="40" step="8" onchange="applyGains()">
    <span class="sa-lbl">VGA</span>
    <input class="sa-input sa-input-sm" id="sa-vga" type="number" value="32" min="0" max="62" step="2" onchange="applyGains()">
  </div>
  <div class="sa-group">
    <span class="sa-lbl">RBW</span>
    <button class="sa-btn on" id="btn-rbw-auto" onclick="toggleRBWAuto()">Auto</button>
    <select class="sa-select" id="sa-rbw-select" onchange="setRBW(parseInt(this.value))">
      <option value="5000000">5 MHz</option>
      <option value="2500000">2.5 MHz</option>
      <option value="1000000">1 MHz</option>
      <option value="500000" selected>500 kHz</option>
      <option value="250000">250 kHz</option>
      <option value="200000">200 kHz</option>
      <option value="100000">100 kHz</option>
      <option value="50000">50 kHz</option>
      <option value="25000">25 kHz</option>
      <option value="15000">15 kHz</option>
      <option value="10000">10 kHz</option>
      <option value="5000">5 kHz</option>
      <option value="3000">3 kHz</option>
    </select>
  </div>
  <div class="sa-group">
    <span class="sa-lbl">Amp</span>
    <button class="sa-btn" id="btn-amp" onclick="toggleAmp()">OFF</button>
  </div>
  <div class="sa-group">
    <span class="sa-lbl">Traces</span>
    <button class="sa-btn on" id="btn-live" onclick="toggleTrace('live')">Live</button>
    <button class="sa-btn" id="btn-peak" onclick="toggleTrace('peak')">Peak</button>
    <button class="sa-btn" id="btn-avg" onclick="toggleTrace('avg')">Avg</button>
    <button class="sa-btn" onclick="clearTraces()">Clear</button>
  </div>
  <div class="sa-group">
    <span class="sa-lbl">Markers</span>
    <button class="sa-btn marker-btn" id="btn-m1" onclick="toggleMarkerMode(1)">M1</button>
    <button class="sa-btn marker-btn" id="btn-m2" onclick="toggleMarkerMode(2)">M2</button>
    <button class="sa-btn" onclick="peakSearch()">Peak</button>
    <button class="sa-btn" onclick="clearMarkers()">Clear</button>
  </div>
  <div class="sa-group" id="marker-readout" style="color:var(--text);min-width:200px"></div>
</div>

<div class="main">
  <div id="spectrum-wrap">
    <canvas id="spectrum-canvas"></canvas>
    <div id="select-overlay"></div>
  </div>
  <div class="resize-h" id="resize-spec-wf"></div>
  <div id="freq-axis"></div>
  <div id="waterfall-wrap">
    <canvas id="waterfall-canvas"></canvas>
    <div class="color-scale" id="color-scale"></div>
    <span class="color-label top" id="cscale-top">-10dB</span>
    <span class="color-label bot" id="cscale-bot">-70dB</span>
  </div>
  <div class="resize-h-bottom" id="resize-wf-bottom"></div>
  <div class="bottom-panel" id="bottom-panel">
    <div class="decoded-panel">
      <div class="decoded-header">
        <h2>MESSAGES <span id="msg-total">(0)</span></h2>
        <input class="filter-input" id="msg-filter" type="text" placeholder="Filter...">
      </div>
      <div id="msg-feed"><div class="no-msg">Waiting for signals...</div></div>
    </div>
    <div class="side-panel">
      <h2>POWER MONITORS</h2><div id="power-monitors"></div>
      <h2 style="margin-top:6px">STATISTICS</h2><div id="stats-panel"></div>
      <h2 style="margin-top:6px">CHANNELS</h2><div id="channels-panel"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let ws;
let sweepConfig = { start_mhz:300, stop_mhz:950, lna_gain:32, vga_gain:32, rbw_hz:500000, amp_enable:false, rbw_auto:true };
let freqMin = 300, freqMax = 950; // actual range from server data
let spectrumData = new Float32Array(0);
let waterfallRows = [], messages = [], powerLevels = {}, stats = {}, filterText = '';
const MAX_WATERFALL = 400;
let startTime = Date.now();

// SA display state (local, doesn't affect hardware)
let refLevel = -10;
let dbPerDiv = 10;
const N_DIV = 8;
let showLive = true, showPeak = false, showAvg = false;
let peakHold = new Float32Array(0);
let avgData = new Float32Array(0);
let avgCount = 0;
const AVG_ALPHA = 0.05;

// Markers
let markers = {};
let markerMode = 0;

// ═══════════════════════════════════════
// SEND COMMAND TO BACKEND
// ═══════════════════════════════════════
function sendCmd(cmd) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(cmd));
  }
}

// ═══════════════════════════════════════
// SA CONTROLS → BACKEND COMMANDS
// ═══════════════════════════════════════
function applyCenter() {
  const c = parseFloat(document.getElementById('sa-center').value);
  const span = sweepConfig.stop_mhz - sweepConfig.start_mhz;
  if (!isNaN(c) && c > 0) sendCmd({ cmd:'set_sweep', center_mhz:c, span_mhz:span });
}

function applySpan() {
  const s = parseFloat(document.getElementById('sa-span').value);
  const center = (sweepConfig.start_mhz + sweepConfig.stop_mhz) / 2;
  if (!isNaN(s) && s > 0) sendCmd({ cmd:'set_sweep', center_mhz:center, span_mhz:s });
}

function applyStartStop() {
  const start = parseFloat(document.getElementById('sa-start').value);
  const stop = parseFloat(document.getElementById('sa-stop').value);
  if (!isNaN(start) && !isNaN(stop) && stop > start) sendCmd({ cmd:'set_sweep', start_mhz:start, stop_mhz:stop });
}

function applyGains() {
  const lna = parseInt(document.getElementById('sa-lna').value);
  const vga = parseInt(document.getElementById('sa-vga').value);
  sendCmd({ cmd:'set_sweep', lna_gain:lna, vga_gain:vga });
}

function updateSADisplay() {
  const center = (sweepConfig.start_mhz + sweepConfig.stop_mhz) / 2;
  const span = sweepConfig.stop_mhz - sweepConfig.start_mhz;
  // Only update inputs if they're not focused (don't interrupt typing)
  if (document.activeElement?.id !== 'sa-center') document.getElementById('sa-center').value = center.toFixed(1);
  if (document.activeElement?.id !== 'sa-span') document.getElementById('sa-span').value = span.toFixed(span < 10 ? 1 : 0);
  if (document.activeElement?.id !== 'sa-start') document.getElementById('sa-start').value = sweepConfig.start_mhz;
  if (document.activeElement?.id !== 'sa-stop') document.getElementById('sa-stop').value = sweepConfig.stop_mhz;
  document.getElementById('sa-ref').textContent = refLevel;
  if (document.activeElement?.id !== 'sa-lna') document.getElementById('sa-lna').value = sweepConfig.lna_gain;
  if (document.activeElement?.id !== 'sa-vga') document.getElementById('sa-vga').value = sweepConfig.vga_gain;
  document.getElementById('cscale-top').textContent = `${refLevel}dB`;
  document.getElementById('cscale-bot').textContent = `${refLevel - dbPerDiv * N_DIV}dB`;
  // RBW buttons
  // RBW display — update dropdown to nearest value
  const rbwHz = sweepConfig.rbw_hz || 500000;
  const sel = document.getElementById('sa-rbw-select');
  if (document.activeElement !== sel) {
    let bestOpt = sel.options[0];
    let bestDist = Infinity;
    for (const opt of sel.options) {
      const d = Math.abs(parseInt(opt.value) - rbwHz);
      if (d < bestDist) { bestDist = d; bestOpt = opt; }
    }
    sel.value = bestOpt.value;
  }
  const rbwAuto = sweepConfig.rbw_auto !== false;
  document.getElementById('btn-rbw-auto').classList.toggle('on', rbwAuto);
  // Amp button
  const ampBtn = document.getElementById('btn-amp');
  ampBtn.textContent = sweepConfig.amp_enable ? 'ON' : 'OFF';
  ampBtn.classList.toggle('on', sweepConfig.amp_enable);
}

function nudgeCenter(dir) {
  const span = sweepConfig.stop_mhz - sweepConfig.start_mhz;
  const step = span * 0.2;
  sendCmd({ cmd:'set_sweep', start_mhz: sweepConfig.start_mhz + dir*step, stop_mhz: sweepConfig.stop_mhz + dir*step });
}

function setSpan(s) {
  if (s === 'full') { sendCmd({ cmd:'set_sweep', start_mhz:1, stop_mhz:6000 }); return; }
  const center = (sweepConfig.start_mhz + sweepConfig.stop_mhz) / 2;
  sendCmd({ cmd:'set_sweep', center_mhz:center, span_mhz:s });
}

function setSweepRange(fMin, fMax) {
  if (fMax - fMin < 2) return;
  sendCmd({ cmd:'set_sweep', start_mhz:fMin, stop_mhz:fMax });
}

function adjustGain(type, delta) {
  if (type === 'lna') { const v = Math.max(0,Math.min(40,sweepConfig.lna_gain+delta)); document.getElementById('sa-lna').value=v; sendCmd({cmd:'set_sweep',lna_gain:v}); }
  if (type === 'vga') { const v = Math.max(0,Math.min(62,sweepConfig.vga_gain+delta)); document.getElementById('sa-vga').value=v; sendCmd({cmd:'set_sweep',vga_gain:v}); }
}

function setRBW(hz) { sendCmd({ cmd:'set_sweep', rbw_hz:hz, rbw_auto:false }); }
function toggleRBWAuto() { sendCmd({ cmd:'set_sweep', rbw_auto: !sweepConfig.rbw_auto }); }
function toggleAmp() { sendCmd({ cmd:'set_sweep', amp_enable: !sweepConfig.amp_enable }); }

function adjustRef(d) { refLevel += d; updateSADisplay(); drawSpectrum(); }
function setDbDiv(d) {
  dbPerDiv = d;
  document.querySelectorAll('[id^="dbdiv-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('dbdiv-' + d); if (btn) btn.classList.add('active');
  updateSADisplay(); drawSpectrum();
}

function toggleTrace(t) {
  if (t==='live'){showLive=!showLive;document.getElementById('btn-live').classList.toggle('on',showLive);}
  if (t==='peak'){showPeak=!showPeak;document.getElementById('btn-peak').classList.toggle('on',showPeak);}
  if (t==='avg'){showAvg=!showAvg;document.getElementById('btn-avg').classList.toggle('on',showAvg);}
  drawSpectrum();
}

function clearTraces() { peakHold.fill(-120); avgData.fill(-100); avgCount=0; drawSpectrum(); }

function toggleMarkerMode(n) {
  markerMode = markerMode===n ? 0 : n;
  document.getElementById('btn-m1').classList.toggle('active',markerMode===1);
  document.getElementById('btn-m2').classList.toggle('active',markerMode===2);
}

function placeMarker(n, freq) {
  const bin = freqToBin(freq);
  if (bin < 0 || bin >= spectrumData.length) return;
  markers[n] = { freq, bin };
  markerMode=0;
  document.getElementById('btn-m1').classList.remove('active');
  document.getElementById('btn-m2').classList.remove('active');
  updateMarkerReadout(); drawSpectrum();
}

function peakSearch() {
  let peakBin=0, peakVal=-999;
  for (let i=0;i<spectrumData.length;i++) { if(spectrumData[i]>peakVal){peakVal=spectrumData[i];peakBin=i;} }
  if(spectrumData.length>0) {
    const freq = freqMin + (peakBin / spectrumData.length) * (freqMax - freqMin);
    markers[1] = { freq, bin:peakBin };
    updateMarkerReadout(); drawSpectrum();
  }
}

function clearMarkers() {
  markers={}; markerMode=0;
  document.getElementById('btn-m1').classList.remove('active');
  document.getElementById('btn-m2').classList.remove('active');
  document.getElementById('marker-readout').innerHTML=''; drawSpectrum();
}

function updateMarkerReadout() {
  const el=document.getElementById('marker-readout'); let html='';
  if(markers[1]){const db=spectrumData[markers[1].bin]?.toFixed(1)||'?';html+=`<span style="color:#f0abfc">M1: ${markers[1].freq.toFixed(2)}MHz ${db}dBm</span>`;}
  if(markers[2]){const db=spectrumData[markers[2].bin]?.toFixed(1)||'?';html+=` <span style="color:#fbbf24">M2: ${markers[2].freq.toFixed(2)}MHz ${db}dBm</span>`;}
  if(markers[1]&&markers[2]){const df=Math.abs(markers[2].freq-markers[1].freq);const ddb=(spectrumData[markers[2].bin]-spectrumData[markers[1].bin]).toFixed(1);html+=` <span style="color:var(--accent)">Δ ${df.toFixed(2)}MHz ${ddb}dB</span>`;}
  el.innerHTML=html;
}

// ═══════════════════════════════════════
// WATERFALL COLOR
// ═══════════════════════════════════════
function dbToColor(db) {
  const bot=refLevel-dbPerDiv*N_DIV;
  const t=Math.max(0,Math.min(1,(db-bot)/(refLevel-bot)));
  if(t<.25){const s=t/.25;return[0,0,Math.floor(80*s)];}
  if(t<.5){const s=(t-.25)/.25;return[0,Math.floor(200*s),80+Math.floor(175*s)];}
  if(t<.75){const s=(t-.5)/.25;return[Math.floor(255*s),200+Math.floor(55*s),Math.floor(255*(1-s))];}
  const s=(t-.75)/.25;return[255,Math.floor(255*(1-s*.6)),Math.floor(255*s*.3)];
}

// ═══════════════════════════════════════
// FREQ/BIN MAPPING (from server data, not hardcoded)
// ═══════════════════════════════════════
function xToFreq(x, w) { return freqMin + (x/w) * (freqMax-freqMin); }
function freqToX(f, w) { return ((f-freqMin)/(freqMax-freqMin)) * w; }
function freqToBin(f) { return Math.round(((f-freqMin)/(freqMax-freqMin)) * (spectrumData.length-1)); }

function zoomAtCursor(cf, factor) {
  const span = sweepConfig.stop_mhz - sweepConfig.start_mhz;
  const ns = span * factor;
  const r = (cf - sweepConfig.start_mhz) / span;
  setSweepRange(cf - ns*r, cf + ns*(1-r));
}

// ═══════════════════════════════════════
// SPECTRUM DRAWING
// ═══════════════════════════════════════
const specCanvas = document.getElementById('spectrum-canvas');
const specCtx = specCanvas.getContext('2d');

function resizeSpecCanvas() {
  const r = specCanvas.parentElement.getBoundingClientRect();
  specCanvas.width = r.width * devicePixelRatio;
  specCanvas.height = r.height * devicePixelRatio;
  specCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

function drawTrace(ctx, data, w, h, dbMin, dbRange, color, lineW) {
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = lineW;
  let first = true;
  for (let px = 0; px < w; px++) {
    const bin = freqToBin(xToFreq(px, w));
    if (bin < 0 || bin >= data.length) continue;
    const db = Math.max(dbMin, Math.min(dbMin + dbRange, data[bin]));
    const y = h - ((db - dbMin) / dbRange) * h;
    if (first) { ctx.moveTo(px, y); first = false; } else ctx.lineTo(px, y);
  }
  ctx.stroke();
}

function drawSpectrum() {
  const w = specCanvas.width / devicePixelRatio;
  const h = specCanvas.height / devicePixelRatio;
  specCtx.clearRect(0, 0, w, h);

  const dbMin = refLevel - dbPerDiv * N_DIV;
  const dbRange = dbPerDiv * N_DIV;

  // Graticule
  specCtx.strokeStyle = 'rgba(30,41,59,.5)';
  specCtx.lineWidth = .5;
  specCtx.fillStyle = '#475569';
  specCtx.font = '9px monospace';

  // Horizontal dB lines
  for (let i = 0; i <= N_DIV; i++) {
    const db = refLevel - i * dbPerDiv;
    const y = (i / N_DIV) * h;
    specCtx.beginPath(); specCtx.moveTo(0, y); specCtx.lineTo(w, y); specCtx.stroke();
    specCtx.fillText(`${db}`, 3, y + 10);
  }

  // Vertical freq lines
  const span = freqMax - freqMin;
  let step = 50;
  if (span <= 5) step = .5;
  else if (span <= 10) step = 1;
  else if (span <= 30) step = 5;
  else if (span <= 80) step = 10;
  else if (span <= 200) step = 20;

  specCtx.strokeStyle = 'rgba(30,41,59,.35)';
  const fStart = Math.ceil(freqMin / step) * step;
  for (let f = fStart; f <= freqMax; f += step) {
    const x = freqToX(f, w);
    specCtx.beginPath(); specCtx.moveTo(x, 0); specCtx.lineTo(x, h); specCtx.stroke();
  }

  // Peak hold trace (yellow, behind live)
  if (showPeak) drawTrace(specCtx, peakHold, w, h, dbMin, dbRange, 'rgba(234,179,8,.6)', .8);

  // Average trace (green, behind live)
  if (showAvg && avgCount > 0) drawTrace(specCtx, avgData, w, h, dbMin, dbRange, 'rgba(34,197,94,.6)', .8);

  // Live trace (blue)
  if (showLive) {
    drawTrace(specCtx, spectrumData, w, h, dbMin, dbRange, '#38bdf8', 1.2);
    // Fill under live
    specCtx.lineTo(w, h); specCtx.lineTo(0, h); specCtx.closePath();
    const grad = specCtx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, 'rgba(56,189,248,.15)');
    grad.addColorStop(1, 'rgba(56,189,248,.01)');
    specCtx.fillStyle = grad;
    specCtx.fill();
  }

  // Band annotations
  const bands = [[380,400,'TETRA'],[430,440,'433 ISM'],[446,446.2,'PMR'],[470,790,'DVB-T'],[791,862,'LTE800'],[865,870,'868 ISM'],[925,960,'GSM900']];
  specCtx.font = '8px monospace';
  specCtx.fillStyle = 'rgba(255,255,255,.15)';
  for (const [lo,hi,name] of bands) {
    if (hi < freqMin || lo > freqMax) continue;
    const x1 = Math.max(0, freqToX(lo,w)), x2 = Math.min(w, freqToX(hi,w));
    if (x2-x1 > 18) specCtx.fillText(name, x1+2, h-4);
  }

  // Markers
  for (const [n, m] of Object.entries(markers)) {
    const x = freqToX(m.freq, w);
    if (x < 0 || x > w) continue;
    const db = spectrumData[m.bin] || -100;
    const y = h - ((Math.max(dbMin, Math.min(dbMin+dbRange, db)) - dbMin) / dbRange) * h;
    const color = n === '1' ? '#f0abfc' : '#fbbf24';
    // Vertical line
    specCtx.strokeStyle = color; specCtx.lineWidth = 1;
    specCtx.setLineDash([3,3]);
    specCtx.beginPath(); specCtx.moveTo(x, 0); specCtx.lineTo(x, h); specCtx.stroke();
    specCtx.setLineDash([]);
    // Diamond
    specCtx.fillStyle = color;
    specCtx.beginPath(); specCtx.moveTo(x,y-5); specCtx.lineTo(x+4,y); specCtx.lineTo(x,y+5); specCtx.lineTo(x-4,y); specCtx.closePath(); specCtx.fill();
    // Label
    specCtx.font = '9px monospace';
    specCtx.fillText(`M${n}`, x+6, y-2);
  }
  updateMarkerReadout();
}

// ═══════════════════════════════════════
// SPECTRUM MOUSE
// ═══════════════════════════════════════
let isDragging = false, dragStartX = 0;
const selectOverlay = document.getElementById('select-overlay');

specCanvas.addEventListener('mousemove', (e) => {
  const r = specCanvas.getBoundingClientRect();
  const x = e.clientX - r.left;
  const freq = xToFreq(x, r.width);
  const bin = freqToBin(freq);
  const db = (bin>=0 && bin<spectrumData.length) ? spectrumData[bin].toFixed(1) : '?';
  document.getElementById('uptime').textContent = `${freq.toFixed(2)} MHz | ${db} dB`;
  if (isDragging) {
    const left = Math.min(dragStartX,x), width = Math.abs(x-dragStartX);
    selectOverlay.style.left = left+'px'; selectOverlay.style.width = width+'px'; selectOverlay.style.display = 'block';
  }
});

specCanvas.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  if (markerMode) {
    const r = specCanvas.getBoundingClientRect();
    const freq = xToFreq(e.clientX - r.left, r.width);
    placeMarker(markerMode, freq);
    return;
  }
  isDragging = true;
  dragStartX = e.clientX - specCanvas.getBoundingClientRect().left;
  selectOverlay.style.display = 'none';
});

specCanvas.addEventListener('mouseup', (e) => {
  if (!isDragging) return;
  isDragging = false;
  selectOverlay.style.display = 'none';
  const r = specCanvas.getBoundingClientRect();
  const endX = e.clientX - r.left;
  if (Math.abs(endX - dragStartX) > 10) {
    const f1 = xToFreq(Math.min(dragStartX, endX), r.width);
    const f2 = xToFreq(Math.max(dragStartX, endX), r.width);
    setSweepRange(f1, f2);
  }
});

specCanvas.addEventListener('mouseleave', () => { isDragging = false; selectOverlay.style.display = 'none'; });

specCanvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const r = specCanvas.getBoundingClientRect();
  zoomAtCursor(xToFreq(e.clientX-r.left, r.width), e.deltaY > 0 ? 1.3 : .7);
}, {passive:false});

const wfCanvas = document.getElementById('waterfall-canvas');
wfCanvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const r = wfCanvas.getBoundingClientRect();
  zoomAtCursor(xToFreq(e.clientX-r.left, r.width), e.deltaY > 0 ? 1.3 : .7);
}, {passive:false});

specCanvas.addEventListener('dblclick', () => sendCmd({cmd:'set_sweep',start_mhz:1,stop_mhz:7250}));
wfCanvas.addEventListener('dblclick', () => sendCmd({cmd:'set_sweep',start_mhz:1,stop_mhz:7250}));

// ═══════════════════════════════════════
// WATERFALL
// ═══════════════════════════════════════
const wfCtx = wfCanvas.getContext('2d');
function resizeWfCanvas() { const r=wfCanvas.parentElement.getBoundingClientRect(); wfCanvas.width=r.width; wfCanvas.height=r.height; }

function drawWaterfall() {
  const w=wfCanvas.width, h=wfCanvas.height, rows=waterfallRows.length;
  if (!rows||!w||!h) return;
  const rowH=Math.max(1,Math.ceil(h/MAX_WATERFALL));
  const drawH=Math.min(rows*rowH,h);
  const imgData=wfCtx.createImageData(w,drawH);
  for (let r=0;r<rows&&r*rowH<drawH;r++) {
    const row=waterfallRows[rows-1-r], yS=r*rowH;
    for (let x=0;x<w;x++) {
      const bin=freqToBin(xToFreq(x,w));
      const db=(bin>=0&&bin<row.length)?row[bin]:-100;
      const [cr,cg,cb]=dbToColor(db);
      for (let dy=0;dy<rowH&&(yS+dy)<drawH;dy++) {
        const off=((yS+dy)*w+x)*4;
        imgData.data[off]=cr;imgData.data[off+1]=cg;imgData.data[off+2]=cb;imgData.data[off+3]=255;
      }
    }
  }
  wfCtx.putImageData(imgData,0,0);
  if (drawH<h){wfCtx.fillStyle='#000';wfCtx.fillRect(0,drawH,w,h-drawH);}
}

// ═══════════════════════════════════════
// FREQ AXIS
// ═══════════════════════════════════════
function drawFreqAxis() {
  const el=document.getElementById('freq-axis'), w=el.getBoundingClientRect().width;
  el.innerHTML='';
  const span=freqMax-freqMin;
  let step=50;
  if(span<=5)step=.5;else if(span<=10)step=1;else if(span<=30)step=5;else if(span<=80)step=10;else if(span<=200)step=20;
  const fS=Math.ceil(freqMin/step)*step;
  for(let f=fS;f<=freqMax;f+=step){
    const x=((f-freqMin)/span)*w;
    const t=document.createElement('span');t.className='freq-tick';t.style.left=x+'px';
    t.textContent=f.toFixed(span<20?1:0);el.appendChild(t);
  }
}

// ═══════════════════════════════════════
// COLOR SCALE
// ═══════════════════════════════════════
function drawColorScale() {
  const el=document.getElementById('color-scale'),c=document.createElement('canvas');
  c.width=12;c.height=100;const ctx=c.getContext('2d');
  for(let y=0;y<100;y++){const db=refLevel-(y/100)*dbPerDiv*N_DIV;const[r,g,b]=dbToColor(db);ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(0,y,12,1);}
  el.style.background=`url(${c.toDataURL()})`;el.style.backgroundSize='cover';
}

// ═══════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════
function setupResize(hId,aId,min){const handle=document.getElementById(hId),above=document.getElementById(aId);let sY,sH;handle.addEventListener('mousedown',(e)=>{e.preventDefault();sY=e.clientY;sH=above.getBoundingClientRect().height;handle.classList.add('active');const onM=(e)=>{above.style.height=Math.max(min,sH+(e.clientY-sY))+'px';above.style.flex='none';resizeAll();};const onU=()=>{handle.classList.remove('active');document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU);};document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);});}
function setupResizeBot(hId,bId,min){const handle=document.getElementById(hId),below=document.getElementById(bId);let sY,sH;handle.addEventListener('mousedown',(e)=>{e.preventDefault();sY=e.clientY;sH=below.getBoundingClientRect().height;handle.classList.add('active');const onM=(e)=>{below.style.height=Math.max(min,sH+(sY-e.clientY))+'px';resizeAll();};const onU=()=>{handle.classList.remove('active');document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU);};document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);});}
setupResize('resize-spec-wf','spectrum-wrap',60);
setupResizeBot('resize-wf-bottom','bottom-panel',60);
function resizeAll(){resizeSpecCanvas();resizeWfCanvas();drawSpectrum();drawWaterfall();drawFreqAxis();}

// ═══════════════════════════════════════
// MESSAGES + FILTER
// ═══════════════════════════════════════
document.getElementById('msg-filter').addEventListener('input',(e)=>{filterText=e.target.value.toLowerCase();document.querySelectorAll('#msg-feed .msg-row').forEach(r=>{r.classList.toggle('filtered-out',filterText&&!r.textContent.toLowerCase().includes(filterText));});});

function updateMessages(newMsgs,total){
  const feed=document.getElementById('msg-feed');
  document.getElementById('msg-total').textContent=`(${total})`;
  if(!newMsgs.length)return;
  const noMsg=feed.querySelector('.no-msg');if(noMsg)noMsg.remove();
  for(const msg of newMsgs){
    if(messages.find(m=>m._ts===msg._ts&&m.model===msg.model))continue;
    messages.push(msg);
    const row=document.createElement('div');row.className='msg-row';
    const time=msg.time||msg._ts||'',ts=time.split('T').pop()?.substring(0,8)||'';
    const model=msg.model||'?',freq=msg._freq||'',rssi=msg.rssi||msg.snr||'';
    const df=[];for(const k of['temperature_C','humidity','battery_ok','wind_avg_km_h','rain_mm','pressure_hPa','code','button','cmd','data','id','channel','state'])if(msg[k]!==undefined)df.push(`${k}=${msg[k]}`);
    row.innerHTML=`<span class="msg-time">${ts}</span> <span class="msg-model">${model}</span> <span class="msg-freq">@${freq}</span>${rssi?` <span class="msg-rssi">[${rssi}dB]</span>`:''}<br><span class="msg-data">${df.join(' | ')}</span>`;
    if(filterText&&!row.textContent.toLowerCase().includes(filterText))row.classList.add('filtered-out');
    feed.insertBefore(row,feed.firstChild);
    while(feed.children.length>200)feed.removeChild(feed.lastChild);
  }
}

// ═══════════════════════════════════════
// POWER / STATS / CHANNELS
// ═══════════════════════════════════════
function updatePower(levels){
  const c=document.getElementById('power-monitors');c.innerHTML='';
  for(const[label,d]of Object.entries(levels)){
    const pct=Math.max(0,Math.min(100,(d.mean_db+50)*2.5));
    let col='var(--green)';if(d.mean_db>-15)col='var(--red)';else if(d.mean_db>-25)col='var(--yellow)';else if(d.mean_db>-35)col='var(--accent)';
    const div=document.createElement('div');div.className='power-meter';
    div.innerHTML=`<div class="power-label"><span class="name">${label}</span><span class="value" style="color:${col}">${d.mean_db}dB pk:${d.peak_db}dB</span></div><div class="power-bar-bg"><div class="power-bar" style="width:${pct}%;background:${col}"></div></div>`;
    c.appendChild(div);
  }
}
function updateStats(s){
  stats=s;const el=document.getElementById('stats-panel'),up=((Date.now()-startTime)/1000)|0;
  el.innerHTML=`<div class="stat-row"><span>Uptime</span><span class="stat-val">${up}s</span></div><div class="stat-row"><span>Sweeps</span><span class="stat-val">${(s.sweeps||0).toLocaleString()}</span></div><div class="stat-row"><span>Decoded</span><span class="stat-val">${s.decoded||0}</span></div><div class="stat-row"><span>Power</span><span class="stat-val">${s.power_readings||0}</span></div>`;
  document.getElementById('sweep-count').textContent=`Sweeps: ${(s.sweeps||0).toLocaleString()}`;
  document.getElementById('decoded-count').textContent=`Decoded: ${s.decoded||0}`;
}
function updateChannels(ch){
  const el=document.getElementById('channels-panel');if(!ch)return;let h='';
  if(ch.rtl433)for(const[id,c]of Object.entries(ch.rtl433))h+=`<div class="stat-row"><span>Ch${id}: ${c.label}</span><span class="stat-val" style="color:var(--green)">RX</span></div>`;
  if(ch.power)for(const[id,c]of Object.entries(ch.power))h+=`<div class="stat-row"><span>Ch${id}: ${c.label}</span><span class="stat-val" style="color:var(--yellow)">PWR</span></div>`;
  el.innerHTML=h;
}

// ═══════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════
function connect(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen=()=>{document.getElementById('conn-status').textContent='LIVE';document.getElementById('conn-status').className='live';startTime=Date.now();};
  ws.onclose=()=>{document.getElementById('conn-status').textContent='DISCONNECTED';document.getElementById('conn-status').className='';setTimeout(connect,2000);};
  ws.onmessage=(evt)=>{
    const msg=JSON.parse(evt.data);
    switch(msg.type){
      case 'init':
        if(msg.sweep_config){sweepConfig=msg.sweep_config;updateSADisplay();}
        drawFreqAxis();if(msg.channels)updateChannels(msg.channels);break;
      case 'sweep_config':
        sweepConfig=msg.sweep_config;
        freqMin=sweepConfig.start_mhz;
        freqMax=sweepConfig.stop_mhz;
        updateSADisplay();drawFreqAxis();
        // Clear traces on config change (new bin count)
        spectrumData=new Float32Array(0);
        peakHold=new Float32Array(0);avgData=new Float32Array(0);avgCount=0;
        waterfallRows=[];
        drawSpectrum();drawWaterfall();
        break;
      case 'spectrum':
        // Update freq range from server data
        if(msg.freq_min!==undefined)freqMin=msg.freq_min;
        if(msg.freq_max!==undefined)freqMax=msg.freq_max;
        if(msg.sweep_config)sweepConfig=msg.sweep_config;

        spectrumData=new Float32Array(msg.data);
        // Resize traces if bin count changed
        if(peakHold.length!==spectrumData.length){peakHold=new Float32Array(spectrumData.length).fill(-120);avgData=new Float32Array(spectrumData.length).fill(-100);avgCount=0;}
        // Update peak hold
        for(let i=0;i<spectrumData.length;i++){if(spectrumData[i]>peakHold[i])peakHold[i]=spectrumData[i];}
        // Update average
        if(avgCount===0){avgData=new Float32Array(spectrumData);avgCount=1;}
        else{for(let i=0;i<spectrumData.length;i++)avgData[i]=avgData[i]*(1-AVG_ALPHA)+spectrumData[i]*AVG_ALPHA;avgCount++;}
        waterfallRows.push(msg.data);
        if(waterfallRows.length>MAX_WATERFALL)waterfallRows.shift();
        if(msg.stats)updateStats(msg.stats);
        updateSADisplay();
        requestAnimationFrame(()=>{drawSpectrum();drawWaterfall();drawFreqAxis();});
        break;
      case 'decoded':updateMessages(msg.messages,msg.total);break;
      case 'power':updatePower(msg.levels);break;
    }
  };
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.addEventListener('resize',resizeAll);
resizeSpecCanvas();resizeWfCanvas();drawFreqAxis();drawColorScale();updateSADisplay();connect();
</script>
